// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
        classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Fix for AGP 8.x "No variants exist" error in older React Native libraries.
// Many community packages (webrtc, incall-manager, get-random-values, etc.) don't declare
// buildTypes in their android/build.gradle. AGP 8.x requires at least one variant to be
// published, so we inject the missing buildTypes into every android library subproject.
subprojects {
    afterEvaluate { project ->
        if (project.plugins.hasPlugin("com.android.library")) {
            android {
                if (!buildTypes.findByName("release")) {
                    buildTypes {
                        release {
                            minifyEnabled false
                        }
                    }
                }
                if (!buildTypes.findByName("debug")) {
                    buildTypes {
                        debug {
                            minifyEnabled false
                        }
                    }
                }
            }
        }
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
